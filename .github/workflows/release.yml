name: Release CLI

on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: bakit-org/ba-kit-solo
          path: ba-kit-solo
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: bash -n bakit
      - run: node -c bin/bakit.js
      - run: node -c lib/archive-helper.js
      - run: node --test tests/archive-helper.test.js
      - run: node tests/check-version-contract.js --tag "${{ github.ref_name }}"
        env:
          BA_KIT_SOLO_DIR: ${{ github.workspace }}/ba-kit-solo
      - run: bash tests/cli-smoke/run-all.sh
      - name: Pack and verify contents
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "Tarball: $TARBALL"
          # Check required files present
          tar -tzf "$TARBALL" | grep -q 'package/bakit$' || { echo "MISSING: bakit"; exit 1; }
          tar -tzf "$TARBALL" | grep -q 'package/bin/bakit.js$' || { echo "MISSING: bin/bakit.js"; exit 1; }
          tar -tzf "$TARBALL" | grep -q 'package/lib/archive-helper.js$' || { echo "MISSING: lib/archive-helper.js"; exit 1; }
          # Check forbidden files absent
          tar -tzf "$TARBALL" | grep -q 'package/.env' && { echo "FORBIDDEN: .env in package"; exit 1; } || true
          tar -tzf "$TARBALL" | grep -q 'package/node_modules/' && { echo "FORBIDDEN: node_modules in package"; exit 1; } || true
          tar -tzf "$TARBALL" | grep -q 'package/ba-kit$' && { echo "FORBIDDEN: ba-kit"; exit 1; } || true
          tar -tzf "$TARBALL" | grep -q 'package/bin/ba-kit.js$' && { echo "FORBIDDEN: bin/ba-kit.js"; exit 1; } || true
          echo "Package contents verified"
      - name: Install tarball in disposable prefix
        run: |
          TARBALL=$(ls *.tgz | head -1)
          PREFIX=$(mktemp -d)
          npm install --global --prefix "$PREFIX" "$(pwd)/$TARBALL"
          test -x "$PREFIX/bin/bakit"
          test ! -e "$PREFIX/bin/ba-kit"
          "$PREFIX/bin/bakit" help
          "$PREFIX/bin/bakit" version
          rm -rf "$PREFIX"
      - run: npm audit --omit=dev

  github-release:
    runs-on: ubuntu-latest
    needs: [verify]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: bakit
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: [verify]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@11.18.0
      - run: npm --version
      - run: npm publish --access public
